apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ferrox.fullname" . }}
  labels:
    {{- include "ferrox.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ferrox.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ferrox.selectorLabels" . | nindent 8 }}
{{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
{{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: ferrox
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --data-dir=/data
            - --bind=0.0.0.0:9000
            - --max-req-per-sec={{ .Values.maxReqPerSec }}
{{- if .Values.tls.enabled }}
            - --tls-bind=0.0.0.0:9443
            - --tls-cert=/tls/tls.crt
            - --tls-key=/tls/tls.key
{{- end }}
          envFrom:
            - secretRef:
                name: {{ include "ferrox.fullname" . }}-credentials
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
{{- if .Values.tls.enabled }}
            - name: https
              containerPort: 9443
              protocol: TCP
{{- end }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
{{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
{{- end }}
      volumes:
        - name: data
{{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ferrox.fullname" . }}-data
{{- else }}
          emptyDir: {}
{{- end }}
{{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
{{- end }}
{{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
{{- end }}
