name: project-health

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 9 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read
  discussions: write

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Coverage
        run: |
          cargo install cargo-tarpaulin --locked
          cargo tarpaulin --workspace --out Json --output-dir target/tarpaulin || true

      - name: Fetch metrics + post summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const repo = context.repo;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              ...repo, state: 'open', per_page: 100,
            });
            const prs = await github.paginate(github.rest.pulls.list, {
              ...repo, state: 'open', per_page: 100,
            });
            const repoData = await github.rest.repos.get(repo);

            let coverage = 'n/a';
            try {
              const j = JSON.parse(fs.readFileSync('target/tarpaulin/tarpaulin-report.json'));
              coverage = j?.files
                ? `${(100 * j.coverable && j.covered / j.coverable).toFixed(1)}%`
                : 'n/a';
            } catch (e) {}

            const date = new Date().toISOString().slice(0, 10);
            const summary = [
              `## Weekly Health Report — ${date}`,
              ``,
              `⭐ Stars: **${repoData.data.stargazers_count}**`,
              `🐛 Open Issues: **${issues.length}**`,
              `📥 Open PRs: **${prs.length}**`,
              `✅ Coverage: **${coverage}**`,
            ].join('\n');

            console.log(summary);
            await core.summary.addRaw(summary).write();
